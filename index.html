<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAX.CORE WORK</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" id="manifest-ph">
<meta name="theme-color" content="#09090b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root{--bg:#09090b;--s1:#111113;--s2:#1a1a1f;--bd:#2a2a30;--tx:#e5e5e5;--t2:#a0a0b0;--t3:#555566;--org:#f97316;--grn:#22c55e;--acc:#2dd4bf;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--tx);font-family:'Lilita One',cursive;min-height:100vh;width:100%;max-width:100vw;overflow-x:hidden;}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s;}
#splash h1{font-size:1.6rem;letter-spacing:2px;color:var(--org);text-transform:uppercase;margin-top:16px;}
#splash p{font-size:0.6rem;color:var(--t3);letter-spacing:1px;margin-top:6px;text-transform:uppercase;}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--bd);}
#header-left{display:flex;align-items:center;gap:8px;}
#header-title{font-size:0.95rem;letter-spacing:0;color:var(--org);text-transform:uppercase;}
#header-sub{font-size:0.5rem;color:var(--t3);letter-spacing:0;text-transform:uppercase;margin-top:1px;}
#header-date{font-size:0.58rem;color:var(--t2);letter-spacing:0;text-align:right;line-height:1.4;}
#status-turno{display:flex;align-items:center;justify-content:center;padding:8px 14px;background:var(--s1);border-bottom:1px solid var(--bd);}
#lbl-turno{font-size:0.72rem;letter-spacing:0;color:var(--t2);text-transform:uppercase;}
#lbl-turno span{color:var(--org);}
#campos{padding:14px 14px 0;}
.campo-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px 14px;margin-bottom:10px;}
.campo-nome{font-size:0.9rem;letter-spacing:0;color:var(--tx);text-transform:uppercase;margin-bottom:4px;}
.campo-desc{font-size:0.52rem;color:var(--t3);letter-spacing:0;margin-bottom:10px;}
.campo-input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px;color:var(--tx);font-family:'Lilita One',cursive;font-size:1.6rem;text-align:center;outline:none;letter-spacing:0;}
.campo-input:focus{border-color:var(--org);}
.campo-input::placeholder{color:var(--t3);font-size:1rem;}
#btn-salvar{width:calc(100% - 28px);margin:14px;padding:16px;background:var(--org);border:none;border-radius:14px;color:#000;font-family:'Lilita One',cursive;font-size:1rem;letter-spacing:0;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
#btn-salvar:active{transform:scale(0.97);}
#btn-salvar.salvo{background:var(--grn);}
#historico-wrap{padding:0 14px 20px;}
#hist-titulo{font-size:0.62rem;color:var(--t3);letter-spacing:0;text-transform:uppercase;margin-bottom:8px;}
#hist-lista{display:flex;flex-direction:column;gap:6px;}
.hist-item{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;}
.hist-item-data{font-size:0.55rem;color:var(--t3);letter-spacing:0;margin-bottom:6px;}
.hist-item-valores{display:flex;gap:10px;flex-wrap:wrap;}
.hist-val{display:flex;flex-direction:column;align-items:center;background:var(--s2);border-radius:8px;padding:6px 12px;min-width:60px;}
.hist-val-num{font-size:1rem;}
.hist-val-lbl{font-size:0.45rem;color:var(--t3);letter-spacing:0;text-transform:uppercase;margin-top:1px;}
.hist-del{float:right;color:var(--t3);font-size:0.8rem;cursor:pointer;}
#hist-vazio{text-align:center;color:var(--t3);font-size:0.7rem;padding:20px;letter-spacing:0;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--grn);color:#000;padding:10px 20px;border-radius:10px;font-size:0.75rem;letter-spacing:0;z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;font-family:'Lilita One',cursive;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="splash">
  <svg width="72" height="72" viewBox="0 0 100 100" fill="none">
    <rect width="100" height="100" rx="22" fill="#09090b"/>
    <rect x="15" y="40" width="70" height="45" rx="6" fill="none" stroke="#f97316" stroke-width="5"/>
    <line x1="50" y1="40" x2="50" y2="85" stroke="#f97316" stroke-width="4"/>
    <line x1="15" y1="62" x2="85" y2="62" stroke="#f97316" stroke-width="4"/>
    <polyline points="50,14 50,32" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    <polyline points="40,22 50,12 60,22" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>WORK</h1>
  <p>MAX.CORE Technology Corp.®</p>
</div>

<div id="toast"></div>

<div id="app" style="display:none">
  <div id="header">
    <div id="header-left">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
        <rect x="10" y="36" width="80" height="54" rx="7" fill="none" stroke="#f97316" stroke-width="6"/>
        <line x1="50" y1="36" x2="50" y2="90" stroke="#f97316" stroke-width="5"/>
        <line x1="10" y1="63" x2="90" y2="63" stroke="#f97316" stroke-width="5"/>
        <polyline points="50,8 50,26" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>
        <polyline points="40,17 50,7 60,17" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <div id="header-title">MAX.CORE WORK</div>
        <div id="header-sub">Registro de Produção</div>
      </div>
    </div>
    <div id="header-date">--</div>
  </div>

  <div id="status-turno">
    <div id="lbl-turno">Turno: <span id="lbl-data-turno">--</span></div>
  </div>

  <div id="campos">
    <div class="campo-card">
      <div class="campo-nome">Paletes Montados</div>
      <div class="campo-desc">Quantidade total no turno</div>
      <input type="number" class="campo-input" id="in-paletes" placeholder="0" min="0" inputmode="numeric">
    </div>
    <div class="campo-card">
      <div class="campo-nome">Sacos no Reator</div>
      <div class="campo-desc">Quantidade arremessada no turno</div>
      <input type="number" class="campo-input" id="in-sacos" placeholder="0" min="0" inputmode="numeric">
    </div>
    <div class="campo-card">
      <div class="campo-nome">Marreta</div>
      <div class="campo-desc">Tempo em minutos no turno</div>
      <input type="number" class="campo-input" id="in-marreta" placeholder="0" min="0" inputmode="numeric">
    </div>
  </div>

  <button id="btn-salvar" onclick="salvar()">💾 Salvar Turno</button>

  <div id="historico-wrap">
    <div id="hist-titulo">Histórico — últimos turnos</div>
    <div id="hist-lista"></div>
    <div id="hist-vazio">Nenhum turno registrado ainda.</div>
  </div>
</div>

<script>
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let historico=[];

function fmtData(ts){
  const d=new Date(ts);
  return DIAS[d.getDay()]+' '+d.getDate()+'/'+MESES[d.getMonth()]+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function atualizarHeader(){
  const d=new Date();
  document.getElementById('header-date').innerHTML=DIAS[d.getDay()]+'., '+d.getDate()+' de '+MESES[d.getMonth()]+'<br>'+d.getFullYear();
  document.getElementById('lbl-data-turno').textContent=d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0')+' — 18h-06h';
}

function salvar(){
  const paletes=parseInt(document.getElementById('in-paletes').value)||0;
  const sacos=parseInt(document.getElementById('in-sacos').value)||0;
  const marreta=parseInt(document.getElementById('in-marreta').value)||0;
  if(paletes===0&&sacos===0&&marreta===0){toast('Preencha ao menos um campo!',true);return;}
  historico.unshift({ts:Date.now(),paletes,sacos,marreta});
  if(historico.length>30)historico.pop();
  localStorage.setItem('work_historico',JSON.stringify(historico));
  ['in-paletes','in-sacos','in-marreta'].forEach(id=>{document.getElementById(id).value='';});
  renderHistorico();
  toast('Turno salvo! ✅');
  const btn=document.getElementById('btn-salvar');
  btn.textContent='✅ Salvo!';btn.classList.add('salvo');
  setTimeout(()=>{btn.textContent='💾 Salvar Turno';btn.classList.remove('salvo');},2000);
}

function renderHistorico(){
  const lista=document.getElementById('hist-lista');
  const vazio=document.getElementById('hist-vazio');
  if(historico.length===0){lista.innerHTML='';vazio.style.display='block';return;}
  vazio.style.display='none';
  lista.innerHTML=historico.map((r,i)=>`
    <div class="hist-item">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="hist-item-data">${fmtData(r.ts)}</div>
        <span class="hist-del" onclick="deletar(${i})">✕</span>
      </div>
      <div class="hist-item-valores">
        <div class="hist-val"><div class="hist-val-num" style="color:var(--org)">${r.paletes}</div><div class="hist-val-lbl">Paletes</div></div>
        <div class="hist-val"><div class="hist-val-num" style="color:var(--acc)">${r.sacos}</div><div class="hist-val-lbl">Sacos</div></div>
        <div class="hist-val"><div class="hist-val-num" style="color:var(--grn)">${r.marreta}min</div><div class="hist-val-lbl">Marreta</div></div>
      </div>
    </div>`).join('');
}

function deletar(i){
  historico.splice(i,1);
  localStorage.setItem('work_historico',JSON.stringify(historico));
  renderHistorico();
  toast('Registro removido');
}

let toastTimer=null;
function toast(msg,erro){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=erro?'var(--red)':'var(--grn)';
  el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

function injetarManifest(){
  const ico=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#09090b"/><rect x="76" y="200" width="360" height="230" rx="30" fill="none" stroke="#f97316" stroke-width="26"/><line x1="256" y1="200" x2="256" y2="430" stroke="#f97316" stroke-width="22"/><line x1="76" y1="315" x2="436" y2="315" stroke="#f97316" stroke-width="22"/><polyline points="256,70 256,160" stroke="#22c55e" stroke-width="28" stroke-linecap="round"/><polyline points="200,112 256,56 312,112" fill="none" stroke="#22c55e" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const b64='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(ico)));
  const manifest={name:'MAX.CORE WORK',short_name:'WORK',start_url:'./',display:'standalone',background_color:'#09090b',theme_color:'#09090b',icons:[{src:b64,sizes:'512x512',type:'image/svg+xml',purpose:'any'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('manifest-ph').setAttribute('href',URL.createObjectURL(blob));
}

window.addEventListener('load',()=>{
  injetarManifest();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  try{historico=JSON.parse(localStorage.getItem('work_historico')||'[]');}catch(e){historico=[];}
  atualizarHeader();
  renderHistorico();
  setTimeout(()=>{
    document.getElementById('splash').style.opacity='0';
    setTimeout(()=>{document.getElementById('splash').style.display='none';document.getElementById('app').style.display='block';},500);
  },1500);
});
</script>
</body>
</html>
